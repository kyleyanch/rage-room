<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rage Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bg-layer"></div>
  <div id="noise-overlay"></div>
  <div id="vignette"></div>
  <div id="break-flash"></div>

  <div id="game-container">

    <!-- LOGO BANNER -->
    <div id="logo-banner">
      <img src="assets/img/rage-room.png" alt="Rage Room" id="logo-img" />
      <div id="logo-text">
        <span class="logo-line">SMASH</span>
        <span class="logo-line accent">RELEASE</span>
        <span class="logo-line">DESTROY</span>
      </div>
    </div>

    <!-- TOP BAR -->
    <div id="top-bar">
      <div id="money-display">
        <span id="money-label">CASH</span>
        <span id="money-amount">$0</span>
      </div>
      <div id="stats-display">
        <div class="stat-chip">
          <span class="stat-label">DMG</span>
          <span class="stat-val" id="stat-damage">1</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">SPD</span>
          <span class="stat-val"><span id="stat-speed">0.0</span>/s</span>
        </div>
        <div class="stat-chip" id="combo-chip" style="display:none;">
          <span class="stat-label">COMBO</span>
          <span class="stat-val" id="stat-combo">x1</span>
        </div>
      </div>
    </div>

    <!-- PROGRESSION BAR -->
    <div id="progression-bar">
      <div id="progression-track">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ARENA -->
    <div id="arena">
      <div id="neon-sign">RAGE ROOM</div>

      <!-- Angry guy — hidden until auto_hitter upgrade is purchased -->
      <div id="angry-guy" style="display:none;">
        <div id="angry-guy-sprite">😤</div>
        <div id="angry-guy-weapon">🔨</div>
      </div>

      <div id="object-area">
        <div id="current-object">
          <div id="object-name">PLATE</div>
          <div id="object-wrapper">
            <div id="object-sprite">🍽️</div>
            <div id="crack-overlay">
              <div class="crack crack-1"></div>
              <div class="crack crack-2"></div>
              <div class="crack crack-3"></div>
            </div>
          </div>
          <div id="hp-bar-container">
            <div id="hp-bar"></div>
          </div>
          <div id="hp-text">10 / 10</div>
        </div>
      </div>

      <button id="hit-btn">
        <span id="hit-btn-text">SMASH</span>
      </button>
    </div>

    <!-- UPGRADES PANEL -->
    <div id="upgrade-panel">
      <div id="upgrade-panel-title">
        <span class="title-bracket">[</span>
        UPGRADES
        <span class="title-bracket">]</span>
      </div>
      <div id="upgrade-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <div id="footer-tag">SMASH · RELEASE · DESTROY</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
